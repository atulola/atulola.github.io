<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReBatch</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:black;
    overflow:hidden;
}

/* VIDEO SECTION */
.hero-video{
    position:relative;
    height:100vh;
    width:100%;
}

.bg-video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Dark overlay */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
}

/* Hidden Content (Appears After Video Ends) */
.after-video{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    color:white;
    opacity:0;
    transition:opacity 1.5s ease;
}

.after-video h1{
    font-size:48px;
    margin-bottom:20px;
}

.after-video span{
    color:#ff6b5c;
}

.buttons{
    margin-top:30px;
}

.btn{
    padding:14px 30px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-weight:600;
    font-size:16px;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
}

.login-btn{
    background:white;
    color:#333;
}

.signup-btn{
    background:#ff6b5c;
    color:white;
}
</style>
</head>

<body>

<section class="hero-video">

    <video id="introVideo" class="bg-video" autoplay muted>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div id="afterContent" class="after-video">
        <h1>Relive. <span>Reconnect.</span><br>ReBatch.</h1>

        <div class="buttons">
            <a href="login.html" class="btn login-btn">Login</a>
            <a href="signup.html" class="btn signup-btn">Sign Up</a>
        </div>
    </div>

</section>

<script>
const video = document.getElementById("introVideo");
const content = document.getElementById("afterContent");

video.onended = function() {
    content.style.opacity = "1";
};
</script>

</body>
</html>
